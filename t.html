<html>
<head>
    <title>Numero de fallos carnet de conducir</title>
</head>
<body>
<script>
let fallos;
fallos = prompt("Pon cuantos fallos tuviste");
fallos = parseFloat(fallos);
if (fallos > 3) {
    alert("No eres Apto");
    document.write("<h1>No eres Apto</h1>");
} else {
    alert("Eres Apto");
    document.write("<h1>Eres Apto</h1>");
}
</script>

</body>
</html>
