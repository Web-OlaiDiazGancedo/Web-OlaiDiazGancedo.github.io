<html>
<head>
    <title>Pulgadas a centímetros</title>
</head>
<body>

<script>
let pulgadas;
let centimetros;

pulgadas = prompt("Pon un número de pulgadas para pasarlo a centímetros");
pulgadas = parseFloat(pulgadas);

centimetros = pulgadas * 2.54;

alert("Eso son " + centimetros + " centímetros");

document.write("<h1>Eso son " + centimetros + " centímetros</h1>");
</script>

</body>
</html>
