
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio 11 — innerHTML</title>

        <style>

        .caja {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
        }

        </style>

    </head>
    <body>

        <h1>Ejercicio 11 — Modificación de HTML con JavaScript</h1>

        <button onclick="saludar()">Saludar</button>
        <button onclick="sumarDosNumeros()">Sumar dos números</button>
        <button onclick="calcularEdad()">Calcular nacimiento</button>
        <button onclick="comprobarMayorEdad()">Mayoría de edad</button>
        <button onclick="agregarMensaje()">Append</button>

        <div id="cajaSaludo" class="caja"></div>
        <div id="cajaSuma" class="caja"></div>
        <div id="cajaNacimiento" class="caja"></div>
        <div id="cajaEdad" class="caja"></div>
        <div id="cajaAppend" class="caja"></div>

        <script>
function saludar() {

        let caja = document.getElementById("cajaSaludo");

        caja.innerHTML = "<h2>Hola desde JavaScript</h2>";

    }

    function sumarDosNumeros() {

        let numero1 = Number(prompt("Introduce el primer número"));
        let numero2 = Number(prompt("Introduce el segundo número"));

        let suma = numero1 + numero2;

        let caja = document.getElementById("cajaSuma");

        caja.innerHTML = "<p>La suma es: " + suma + "</p>";

    }

    function comprobarMayorEdad() {
        var edad = Number(prompt("Introduce tu edad"));

        if (edad >= 18) {
            alert("Eres mayor de edad.");
        } else {
            alert("Eres menor de edad.");
        }
    }
 function calcularEdad() {
        var edad = Number(prompt("Introduce tu edad"));
        var anioActual = 2026;

        var fechaNacimiento = anioActual - edad;

        alert("Tu año aproximado de nacimiento es: " + fechaNacimiento);
    }

            function agregarMensaje() {

        let caja = document.getElementById("cajaAppend");

        caja.append(" Nuevo mensaje añadido ");

    }

        </script>

    </body>
    </html>
