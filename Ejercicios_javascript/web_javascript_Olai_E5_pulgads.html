<html>
<head>
    <title>Pulgadas a centimetros</title>
</head>
<body>

<script>
let pulgadas;
let centimetros;

pulgadas = prompt("Pon un numero de pulgadas para pasarlo a centimetros");
pulgadas = parseFloat(pulgadas);

centimetros = pulgadas * 2.54;

alert("Eso son " + centimetros + " centimetros");

document.write("<h1>Eso son " + centimetros + " centimetros</h1>");
</script>

</body>
</html>
