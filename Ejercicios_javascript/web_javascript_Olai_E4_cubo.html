<html>
<head>
    <title>Cubo</title>
</head>
<body>

<script>
let lado

lado = prompt("Pon un numero que quieras que sea lado");

lado = parseFloat(lado);


volumen = lado*lado*lado

alert("El volumen del cubo es: " + volumen);

document.write("<h1>El volumen del cubo es: " + volumen+ "</h1>");
</script>

</body>
</html>
