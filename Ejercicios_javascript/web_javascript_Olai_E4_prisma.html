<html>
<head>
    <title>Prisma</title>
</head>
<body>

<script>
let anchura
  let profundidad
  let altura

anchura = prompt("Pon un numero que quieras que sea la anchura");
profundidad = prompt("Pon un numero que quieras que sea la profundidad");
altura = prompt("Pon un numero que quieras que sea la altura");

anchura = parseFloat(anchura);
profundidad = parseFloat(profundidad );
altura = parseFloat(altura);


volumen = anchura*profundidad*altura

alert("El volumen del prisma es: " + volumen);

document.write("<h1>El volumen del prisma es: " + volumen+ "</h1>");
</script>

</body>
</html>
