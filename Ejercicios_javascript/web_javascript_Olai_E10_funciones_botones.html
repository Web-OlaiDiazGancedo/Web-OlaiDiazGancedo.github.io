<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 — Funciones y botones</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
        }

        button {
            display: block;
            margin: 10px 0;
            padding: 12px;
            width: 250px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #0077cc;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>

<body>

    <h1>Ejercicio 10 — Funciones y botones</h1>

    <p>En esta página se usan botones para ejecutar diferentes funciones en JavaScript.</p>

    <button onclick="saludar()">Saludar</button>

    <button onclick="sumarDosNumeros()">
        Sumar dos números
    </button>

    <button onclick="calcularEdad()">
        Calcular año de nacimiento
    </button>

    <button onclick="comprobarMayorEdad()">
        Comprobar mayoría de edad
    </button>

    <!-- BOTÓN EXTRA -->
    <button onclick="comprobarNota()">
        Comprobar nota
    </button>

    <script>

        // FUNCIÓN 1
        function saludar() {
            alert("Hola. Has ejecutado la función saludar.");
        }

        // FUNCIÓN 2
        function sumarDosNumeros() {

            var numero1 = Number(
                prompt("Introduce el primer número")
            );

            var numero2 = Number(
                prompt("Introduce el segundo número")
            );

            var suma = numero1 + numero2;

            alert("El resultado de la suma es: " + suma);
        }

        // FUNCIÓN 3
        function calcularEdad() {

            var edad = Number(
                prompt("Introduce tu edad")
            );

            var anioActual = 2026;

            var fechaNacimiento = anioActual - edad;

            alert(
                "Tu año aproximado de nacimiento es: "
                + fechaNacimiento
            );
        }

        // FUNCIÓN 4
        function comprobarMayorEdad() {

            var edad = Number(
                prompt("Introduce tu edad")
            );

            if (edad >= 18) {

                alert("Eres mayor de edad.");

            } else {

                alert("Eres menor de edad.");
            }
        }

        // FUNCIÓN 5 - MEJORA OBLIGATORIA
        function comprobarNota() {

            var nota = Number(
                prompt("Introduce tu nota")
            );

            if (nota >= 5) {

                alert("Has aprobado.");

            } else {

                alert("Has suspendido.");
            }
        }

    </script>

</body>
</html>
