<html>
<head>
    <title>Cilindro</title>
</head>
<body>

<script>
let radio
let altura


radio = prompt("Pon un numero que quieras que sea radio");
altura = prompt("Pon un numero que quieras que sea altura");


radio = parseFloat(radio);
altura = parseFloat(altura);


volumen = radio * radio * 3.14159265358979*altura

alert("El volumen del cilindro es: " + volumen);

document.write("<h1>El volumen del cilindro es: " + volumen+ "</h1>");
</script>

</body>
</html>
