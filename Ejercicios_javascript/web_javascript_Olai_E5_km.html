<html>
<head>
    <title>Kilometros a metros</title>
</head>
<body>

<script>
let km

km = prompt("Pon un numero de kilometros para pasarlo a metros");

 km= parseFloat( km);


metros = km*1000

alert("Eso son " + metros + "metros");

document.write("<h1>Eso son " + metros + "metros"</h1>");
</script>

</body>
