<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 08 — else if y switch</title>
</head>
<body>

<h1>Ejercicio 08 — Estructuras condicionales else if y switch</h1>

<p>
En este ejercicio se trabaja con estructuras condicionales. 
Se prueba un ejemplo con <b>if - else if - else</b>, se corrigen errores de sintaxis 
y se desarrolla un programa de helados con <b>else if</b> y <b>switch</b>.
</p>

<script>


var tarea = window.prompt("¿Has entregado la tarea? (si / no)");

if (tarea == "si") {
    document.write("<p>Perfecto, tarea entregada correctamente.</p>");
} else if (tarea == "no") {
    document.write("<p>Debes entregarla cuanto antes.</p>");
} else {
    document.write("<p>Respuesta no válida. Responde si o no.</p>");
}



let numero = prompt("Ingresa un número:");

if (numero > 0) { 
    alert("El número es positivo"); 
} else if (numero < 0) { 
    alert("El número es negativo"); 
} else { 
    alert("El número es cero"); 
}




// -------- Ejercicio 2 (corregido) --------
let contraseña = prompt("Ingresa tu contraseña:");

if (contraseña === "secreto123") { 
    document.write("<p>Contraseña correcta. Bienvenido!</p>"); 
} else { 
    document.write("<p>Contraseña incorrecta. Inténtalo de nuevo.</p>"); 
}



// -------- Ejercicio 3 --------
let valor = null;

if (valor === null) { 
    alert("El valor es nulo."); 
} else { 
    alert("El valor no es nulo."); 
}



// -------- Ejercicio 4 (corregido) --------
let num = parseInt(prompt("Ingresa un número:"));

if (num > 0 && num % 2 === 0) { 
    console.log("El número es positivo y par"); 
} else if (num > 0 && num % 2 !== 0) { 
    console.log("El número es positivo e impar"); 
} else { 
    console.log("El número no es positivo"); 
}



var topping = window.prompt("¿Qué topping quieres: oreo, kitkat, brownie, lacasitos u otro?");
var precio = 0.00;
var helado = 1.90;
var precioFinal = 0.00;

if (topping == "oreo") {
    precio = 1;
} else if (topping == "kitkat") {
    precio = 1.50;
} else if (topping == "brownie") {
    precio = 0.75;
} else if (topping == "lacasitos") {
    precio = 0.95;
} else {
    document.write("<p>No tenemos este topping, lo sentimos.</p>");
    precio = 0;
}

precioFinal = helado + precio;
document.write("<p>El helado cuesta " + precioFinal + " €</p>");


var topping2 = window.prompt("¿Qué topping quieres (versión switch)?");
var precio2 = 0;

switch (topping2) {
    case "oreo":
        precio2 = 1;
        break;
    case "kitkat":
        precio2 = 1.50;
        break;
    case "brownie":
        precio2 = 0.75;
        break;
    case "lacasitos":
        precio2 = 0.95;
        break;
    default:
        document.write("<p>No tenemos este topping, lo sentimos.</p>");
        precio2 = 0;
}

var precioFinal2 = 1.90 + precio2;
document.write("<p>El helado (switch) cuesta " + precioFinal2 + " €</p>");


</script>

</body>
</html>
