<html>
<head>
    <title>Pulgadas a centimetros</title>
</head>
<body>

<script>
let hectareas;


hectareas  = prompt("Pon un numero de hectareas para pasarlo a metros cuadrados");
hectareas = parseFloat(hectareas );

metros_cuadrados = hectareas  * 10000;

alert("Eso son " + metros_cuadrados + " metros cuadrados");

document.write("<h1>Eso son " + metros_cuadrados + " metros cuadrados</h1>");
</script>

</body>
</html>
