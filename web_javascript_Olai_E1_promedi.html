<html>
<head>
    <title>Euros a dolares</title>
</head>
<body>

<script>
let euros;


euros= prompt("Pon un numero de euros para pasarlo a dolares");
euros= parseFloat(euros);

dolares = euros*1.12 ;

alert("Eso son " + dolares + " dolares");

document.write("<h1>Eso son " + dolares + "dolares</h1>");
</script>

</body>
</html>
